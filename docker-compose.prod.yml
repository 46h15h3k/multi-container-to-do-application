version: "3.9"

services:
  api:
    image: ${DOCKERHUB_USERNAME}/todo-api:${IMAGE_TAG:-latest}
    container_name: todo-api
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/tododb
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - todo-net
    # No host port published here on purpose - only Nginx is exposed publicly.
    # Uncomment below if you want to hit the API directly too, e.g. for debugging.
    # ports:
    #   - "3000:3000"

  mongo:
    image: mongo:7
    container_name: todo-mongo
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - todo-net

  nginx:
    image: nginx:1.27-alpine
    container_name: todo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - todo-net

volumes:
  mongo-data:

networks:
  todo-net:
    driver: bridge
