version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-api
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/tododb
    volumes:
      - ./src:/usr/src/app/src
      - ./package.json:/usr/src/app/package.json
      - /usr/src/app/node_modules
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - todo-net

  mongo:
    image: mongo:7
    container_name: todo-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - todo-net

volumes:
  mongo-data:

networks:
  todo-net:
    driver: bridge
