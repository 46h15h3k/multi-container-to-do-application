---
- name: Provision EC2 host and deploy the Dockerized Todo API
  hosts: todo_app
  become: true

  vars:
    app_dir: /opt/todo-app
    dockerhub_username: "{{ lookup('env', 'DOCKERHUB_USERNAME') }}"
    image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"

  tasks:
    - name: Install Docker (Amazon Linux 2023 uses dnf)
      dnf:
        name: docker
        state: present
      when: ansible_facts['distribution'] == "Amazon"

    - name: Install Docker (Debian/Ubuntu family, for portability)
      apt:
        name: docker.io
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to the docker group
      user:
        name: ec2-user
        groups: docker
        append: true
      when: ansible_facts['distribution'] == "Amazon"

    - name: Install Docker Compose plugin (Debian/Ubuntu, available via apt)
      apt:
        name: docker-compose-plugin
        state: present
      when: ansible_facts['os_family'] == "Debian"

    # AL2023's dnf repos don't carry docker-compose-plugin, and Amazon's own
    # docker package doesn't bundle it either - pull the official binary
    # straight from Docker's GitHub releases instead.
    - name: Create CLI plugins directory (AL2023)
      file:
        path: /usr/libexec/docker/cli-plugins
        state: directory
        mode: "0755"
      when: ansible_facts['distribution'] == "Amazon"

    - name: Download Docker Compose plugin binary (AL2023)
      get_url:
        url: "https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-{{ 'x86_64' if ansible_facts['architecture'] == 'x86_64' else 'aarch64' }}"
        dest: /usr/libexec/docker/cli-plugins/docker-compose
        mode: "0755"
      when: ansible_facts['distribution'] == "Amazon"

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ec2-user
        mode: "0755"

    - name: Create nginx config directory
      file:
        path: "{{ app_dir }}/nginx"
        state: directory
        owner: ec2-user
        mode: "0755"

    - name: Template production docker-compose.yml onto the server
      template:
        src: templates/docker-compose.yml.j2
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: ec2-user
        mode: "0644"

    - name: Copy Nginx reverse proxy config
      copy:
        src: ../nginx/nginx.conf
        dest: "{{ app_dir }}/nginx/nginx.conf"
        owner: ec2-user
        mode: "0644"

    - name: Pull latest images
      command: docker compose pull
      args:
        chdir: "{{ app_dir }}"

    - name: Start the application stack
      command: docker compose up -d
      args:
        chdir: "{{ app_dir }}"
